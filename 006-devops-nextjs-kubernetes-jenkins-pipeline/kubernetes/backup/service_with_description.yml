apiVersion: v1  # Kubernetes Service API versiyonu (core API grubu)
kind: Service  # Kaynak tipi: Service (pod’lara ağ erişimi sağlar)

metadata:  # Servisin kimlik bilgileri
  name: 006-devops-nextjs-kubernetes-jenkins-pipeline  # Service adı (cluster içinde erişim adı)
  labels:  # Servisi tanımlayan etiketler
    app: 006-devops-nextjs-kubernetes-jenkins-pipeline  # Uygulama etiketi (pod selector ile eşleşir)
    team: frontend  # Takım bilgisi (organizasyon amaçlı)

spec:  # Servisin davranış kuralları
  type: LoadBalancer  # Dış dünyaya açılan servis (cloud load balancer oluşturur)

  ports:  # Trafik yönlendirme kuralları
    - port: 80  # Dışarıdan erişilen port (HTTP standart port)
      targetPort: 3000  # Pod içinde çalışan uygulamanın portu (Next.js 3000)

  selector:  # Bu service hangi pod’lara trafik yönlendirecek
    app: 006-devops-nextjs-kubernetes-jenkins-pipeline  # Aynı label’a sahip pod’ları seçer

# Kubernetes’te Service, pod’lara sabit bir ağ erişim noktası sağlayan soyut bir katmandır.
# Pod’lar sürekli değişip yeniden oluşturulabildiği için Service, bu değişken yapıya karşı stabil bir IP ve DNS üzerinden trafik yönlendirmesi yapar.
# Ayrıca gelen istekleri selector ile eşleşen pod’lar arasında load balancing yaparak dağıtır.
# Evet, pod’lar değişse bile erişim adresi sabit kalsın ve istemciler sürekli IP takip etmek zorunda kalmasın diye Service kullanılır.

# Service Olmasaydı Ne Olurdu?
# Pod’lar yeniden oluşturulduğunda IP adresleri değişeceği için uygulamalara doğrudan ve stabil bir şekilde erişmek mümkün olmazdı.
# Bu durumda her değişiklikte yeni IP’leri takip etmek gerekir ve sistem hem kırılgan hem de yönetilemez hale gelirdi.

# Service olmasaydı her pod için ayrı ayrı dış IP açıp manuel erişim yönetmek zorunda kalırdın.
# Örnek (Service yokken doğrudan pod’u dışa açma):
# kubectl expose pod my-pod --type=NodePort --port=3000
# veya daha manuel senaryoda her pod için ayrı port/IP takip etmen gerekirdi:
# kubectl get pods -o wide
# → çıkan her pod IP’sine tek tek erişmeye çalışırdın (sabitlik olmazdı).